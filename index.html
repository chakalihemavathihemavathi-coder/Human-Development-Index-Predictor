<!DOCTYPE html>
<html>
<head>
    <title>Human Development Index Predictor</title>
</head>
<body>
    <h1>Human Development Index Predictor</h1>

    <form action="/predict" method="post">
        <label>Life Expectancy:</label><br>
        <input type="number" step="any" name="life" required><br><br>

        <label>Education Index:</label><br>
        <input type="number" step="any" name="education" required><br><br>

        <label>Income Index:</label><br>
        <input type="number" step="any" name="income" required><br><br>

        <input type="submit" value="Predict HDI">
    </form>

    <br>

    <h2>{{ prediction_text }}</h2>

</body>
                                      </html>
