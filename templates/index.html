<!DOCTYPE html>
<html>
<head>
    <title>Human Development Index Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Human Development Index Predictor</h1>
    <p>Enter the details below to predict the Human Development Index (HDI).</p>

    <form action="/predict" method="POST">

        <label>Life Expectancy (Years)</label>
        <input type="number" step="0.1" name="life" required>

        <label>Education Index</label>
        <input type="number" step="0.01" name="education" required>

        <label>Income Index</label>
        <input type="number" step="0.01" name="income" required>

        <button type="submit">Predict HDI</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <h2>{{ prediction_text }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
